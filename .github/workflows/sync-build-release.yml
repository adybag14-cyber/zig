name: Sync Codeberg Master And Mirror Release Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: zig-codeberg-sync-release
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
      upstream_sha: ${{ steps.sync.outputs.upstream_sha }}
      short_sha: ${{ steps.sync.outputs.short_sha }}
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync master from Codeberg
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream https://codeberg.org/ziglang/zig.git
          git fetch --prune upstream master

          before="$(git ls-remote origin refs/heads/master | awk '{print $1}')"
          after="$(git rev-parse refs/remotes/upstream/master)"
          short="${after::12}"

          echo "upstream_sha=$after" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$before" != "$after" ]]; then
            git push --force origin "refs/remotes/upstream/master:refs/heads/master"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  mirror_release_assets:
    name: Mirror Zig Master Release Assets
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout synced master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1

      - name: Capture sync metadata
        id: sync_meta
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git rev-parse HEAD)"
          expected='${{ needs.sync.outputs.upstream_sha }}'
          short='${{ needs.sync.outputs.short_sha }}'
          subject="$(git log -1 --format=%s)"

          if [[ -n "$expected" && "$sha" != "$expected" ]]; then
            echo "Expected upstream SHA $expected but checked out $sha" >&2
            exit 1
          fi

          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short" >> "$GITHUB_OUTPUT"
          echo "subject=$subject" >> "$GITHUB_OUTPUT"
          echo "release_tag=upstream-$short" >> "$GITHUB_OUTPUT"
          echo "latest_release_tag=latest-master" >> "$GITHUB_OUTPUT"

      - name: Verify host tools
        shell: bash
        run: |
          set -euo pipefail
          jq --version
          sha256sum --version | head -n 1

      - name: Download Zig master index
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --output index.json https://ziglang.org/download/index.json

      - name: Mirror published master assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          version="$(jq -r '.master.version' index.json)"
          published_date="$(jq -r '.master.date' index.json)"

          mkdir -p release-assets latest-assets

          jq -r '
            .master
            | to_entries[]
            | select(.value | type == "object" and has("tarball"))
            | [.key, .value.tarball, .value.shasum] | @tsv
          ' index.json > asset-manifest.tsv

          while IFS=$'\t' read -r key url shasum; do
            file_name="$(basename "$url")"
            out_path="release-assets/$file_name"
            latest_name="${file_name//$version/latest-master}"
            latest_path="latest-assets/$latest_name"

            curl -L --fail --output "$out_path" "$url"
            echo "$shasum  $out_path" | sha256sum -c -
            cp "$out_path" "$latest_path"
          done < asset-manifest.tsv

          find release-assets -maxdepth 1 -type f | sort > release-files.txt
          find latest-assets -maxdepth 1 -type f | sort > latest-files.txt

          {
            echo "binary_version=$version"
            echo "published_date=$published_date"
            echo 'release_files<<EOF'
            cat release-files.txt
            echo EOF
            echo 'latest_files<<EOF'
            cat latest-files.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Publish immutable GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.sync_meta.outputs.release_tag }}
          target_commitish: ${{ steps.sync_meta.outputs.sha }}
          name: Zig upstream master ${{ steps.sync_meta.outputs.short_sha }}
          prerelease: true
          overwrite_files: true
          files: ${{ steps.assets.outputs.release_files }}
          body: |
            Automated sync from Codeberg `master`.

            Synced Codeberg commit: `${{ steps.sync_meta.outputs.sha }}`
            Commit subject: `${{ steps.sync_meta.outputs.subject }}`

            Mirrored published Zig `master` assets from `https://ziglang.org/download/`:
            Version: `${{ steps.assets.outputs.binary_version }}`
            Published date: `${{ steps.assets.outputs.published_date }}`

            This release mirrors the full published asset set from Zig's current `master` download index, including source, bootstrap, and platform binaries.

      - name: Publish rolling latest-master release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.sync_meta.outputs.latest_release_tag }}
          target_commitish: ${{ steps.sync_meta.outputs.sha }}
          name: Zig latest master
          prerelease: true
          overwrite_files: true
          files: ${{ steps.assets.outputs.latest_files }}
          body: |
            Rolling latest-master prerelease for the newest successful Codeberg `master` sync.

            Synced Codeberg commit: `${{ steps.sync_meta.outputs.sha }}`
            Commit subject: `${{ steps.sync_meta.outputs.subject }}`

            Mirrored published Zig `master` assets from `https://ziglang.org/download/`:
            Version: `${{ steps.assets.outputs.binary_version }}`
            Published date: `${{ steps.assets.outputs.published_date }}`

            This tag is intentionally updated in place. Use the per-commit `upstream-<shortsha>` releases for immutable archives.
