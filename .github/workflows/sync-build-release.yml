name: Sync Codeberg Master And Build Release Assets

on:
  workflow_dispatch:
    inputs:
      release_scope:
        description: Build all release groups or limit the run to one group for validation.
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
          - sync-only
  schedule:
    # Avoid :00 start to reduce best-effort schedule drops/delays during peak load.
    - cron: "23 */8 * * *"

permissions:
  contents: write

concurrency:
  group: zig-codeberg-sync-release
  cancel-in-progress: false

env:
  BUILD_JOBS: "4"
  HOST_MCPU: baseline
  MCPU: baseline

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
      upstream_sha: ${{ steps.sync.outputs.upstream_sha }}
      short_sha: ${{ steps.sync.outputs.short_sha }}
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync master from Codeberg
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream https://codeberg.org/ziglang/zig.git
          git fetch --prune upstream master

          before="$(git ls-remote origin refs/heads/master | awk '{print $1}')"
          after="$(git rev-parse refs/remotes/upstream/master)"
          short="${after::12}"

          echo "upstream_sha=$after" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$before" != "$after" ]]; then
            git push --force origin "refs/remotes/upstream/master:refs/heads/master"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  metadata:
    name: Resolve Release Metadata
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      subject: ${{ steps.meta.outputs.subject }}
      zig_version: ${{ steps.meta.outputs.zig_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      latest_release_tag: ${{ steps.meta.outputs.latest_release_tag }}
      bootstrap_tarball: ${{ steps.meta.outputs.bootstrap_tarball }}
      bootstrap_seed_version: ${{ steps.meta.outputs.bootstrap_seed_version }}
      bootstrap_seed_date: ${{ steps.meta.outputs.bootstrap_seed_date }}
      required_llvm_major: ${{ steps.meta.outputs.required_llvm_major }}
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: automation

      - name: Checkout synced master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          path: zig-source

      - name: Install metadata dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Verify synced master checkout
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git -C zig-source rev-parse HEAD)"
          expected='${{ needs.sync.outputs.upstream_sha }}'

          if [[ -n "$expected" && "$sha" != "$expected" ]]; then
            echo "Expected upstream SHA $expected but checked out $sha" >&2
            exit 1
          fi

      - name: Fetch upstream tags
        shell: bash
        run: |
          set -euo pipefail
          git -C zig-source remote add upstream https://codeberg.org/ziglang/zig.git
          git -C zig-source fetch --force --tags upstream

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git -C zig-source rev-parse HEAD)"
          short='${{ needs.sync.outputs.short_sha }}'
          subject="$(git -C zig-source log -1 --format=%s)"
          zig_version="$(bash automation/scripts/version-from-zig-source.sh zig-source)"

          index_json="$(curl -fsSL https://ziglang.org/download/index.json)"
          bootstrap_tarball="$(jq -r '.master.bootstrap.tarball' <<<"$index_json")"
          bootstrap_seed_version="$(jq -r '.master.version' <<<"$index_json")"
          bootstrap_seed_date="$(jq -r '.master.date' <<<"$index_json")"

          required_llvm_major="$(sed -nE 's/.*expected LLVM ([0-9]+)\.x.*/\1/p' zig-source/cmake/Findllvm.cmake | head -n 1)"

          if [[ -z "$required_llvm_major" ]]; then
            echo "Failed to determine required LLVM major from zig-source/cmake/Findllvm.cmake" >&2
            exit 1
          fi

          {
            echo "sha=$sha"
            echo "short_sha=$short"
            echo "subject=$subject"
            echo "zig_version=$zig_version"
            echo "release_tag=upstream-$short"
            echo "latest_release_tag=latest-master"
            echo "bootstrap_tarball=$bootstrap_tarball"
            echo "bootstrap_seed_version=$bootstrap_seed_version"
            echo "bootstrap_seed_date=$bootstrap_seed_date"
            echo "required_llvm_major=$required_llvm_major"
          } >> "$GITHUB_OUTPUT"

  build_host_toolchain:
    name: Build reusable bootstrap host toolchain
    needs:
      - sync
      - metadata
    if: needs.sync.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.release_scope != 'sync-only')
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: automation

      - name: Checkout synced master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 1
          path: zig-source

      - name: Verify synced master checkout
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git -C zig-source rev-parse HEAD)"
          expected='${{ needs.metadata.outputs.sha }}'

          if [[ "$sha" != "$expected" ]]; then
            echo "Expected upstream SHA $expected but checked out $sha" >&2
            exit 1
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config rsync xz-utils zip zlib1g-dev zstd

      - name: Prepare bootstrap sources
        shell: bash
        run: |
          set -euo pipefail

          bash automation/scripts/prepare-bootstrap-sources.sh \
            "$RUNNER_TEMP/bootstrap" \
            '${{ needs.metadata.outputs.bootstrap_tarball }}' \
            '${{ needs.metadata.outputs.required_llvm_major }}'

          rm -rf "$RUNNER_TEMP/bootstrap/zig"
          mkdir -p "$RUNNER_TEMP/bootstrap/zig"
          rsync -a --delete --exclude '.git' zig-source/ "$RUNNER_TEMP/bootstrap/zig/"

      - name: Build bootstrap host toolchain
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/dist"

          bash automation/scripts/build-zig-bootstrap-group.sh \
            "$RUNNER_TEMP/bootstrap" \
            '${{ needs.metadata.outputs.zig_version }}' \
            "$RUNNER_TEMP/dist" \
            --host-only

          test -x "$RUNNER_TEMP/bootstrap/out/host/bin/zig"
          test -x "$RUNNER_TEMP/bootstrap/out/host/bin/llvm-tblgen"
          test -x "$RUNNER_TEMP/bootstrap/out/build-llvm-host/bin/clang-tblgen"
          test -d "$RUNNER_TEMP/bootstrap/out/host/lib/zig/std"
          "$RUNNER_TEMP/bootstrap/out/host/bin/zig" version

      - name: Pack bootstrap host toolchain
        shell: bash
        run: |
          set -euo pipefail

          stage="$RUNNER_TEMP/bootstrap-host-toolchain"
          rm -rf "$stage"
          mkdir -p \
            "$stage/out/host/bin" \
            "$stage/out/host/lib" \
            "$stage/out/build-llvm-host/bin"

          for tool in zig llvm-tblgen llvm-rc llvm-ar llvm-ranlib; do
            cp "$RUNNER_TEMP/bootstrap/out/host/bin/$tool" "$stage/out/host/bin/$tool"
          done

          cp "$RUNNER_TEMP/bootstrap/out/build-llvm-host/bin/clang-tblgen" \
            "$stage/out/build-llvm-host/bin/clang-tblgen"
          cp -a "$RUNNER_TEMP/bootstrap/out/host/lib/zig" "$stage/out/host/lib/zig"

          "$stage/out/host/bin/zig" version
          test -d "$stage/out/host/lib/zig/std"

          tar --use-compress-program 'zstd -T0 -3' \
            -cf "$RUNNER_TEMP/host-bootstrap.tar.zst" \
            -C "$stage" \
            out

      - name: Upload bootstrap host toolchain
        uses: actions/upload-artifact@v7
        with:
          name: bootstrap-host-toolchain
          path: ${{ runner.temp }}/host-bootstrap.tar.zst
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  build_x86_64_linux:
    name: Build zig-x86_64-linux Release Asset
    needs:
      - sync
      - metadata
      - build_host_toolchain
    if: needs.sync.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.release_scope == 'all' || github.event.inputs.release_scope == 'linux')
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    steps:
