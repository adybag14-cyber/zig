name: Sync Codeberg Master And Build Release Assets

on:
  workflow_dispatch:
    inputs:
      release_scope:
        description: Build all release groups or limit the run to one group for validation.
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: zig-codeberg-sync-release
  cancel-in-progress: false

env:
  BUILD_JOBS: "4"
  MCPU: baseline

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
      upstream_sha: ${{ steps.sync.outputs.upstream_sha }}
      short_sha: ${{ steps.sync.outputs.short_sha }}
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync master from Codeberg
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream https://codeberg.org/ziglang/zig.git
          git fetch --prune upstream master

          before="$(git ls-remote origin refs/heads/master | awk '{print $1}')"
          after="$(git rev-parse refs/remotes/upstream/master)"
          short="${after::12}"

          echo "upstream_sha=$after" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$before" != "$after" ]]; then
            git push --force origin "refs/remotes/upstream/master:refs/heads/master"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  metadata:
    name: Resolve Release Metadata
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      subject: ${{ steps.meta.outputs.subject }}
      zig_version: ${{ steps.meta.outputs.zig_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      latest_release_tag: ${{ steps.meta.outputs.latest_release_tag }}
      bootstrap_tarball: ${{ steps.meta.outputs.bootstrap_tarball }}
      bootstrap_seed_version: ${{ steps.meta.outputs.bootstrap_seed_version }}
      bootstrap_seed_date: ${{ steps.meta.outputs.bootstrap_seed_date }}
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: automation

      - name: Checkout synced master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          path: zig-source

      - name: Install metadata dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Verify synced master checkout
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git -C zig-source rev-parse HEAD)"
          expected='${{ needs.sync.outputs.upstream_sha }}'

          if [[ -n "$expected" && "$sha" != "$expected" ]]; then
            echo "Expected upstream SHA $expected but checked out $sha" >&2
            exit 1
          fi

      - name: Fetch upstream tags
        shell: bash
        run: |
          set -euo pipefail
          git -C zig-source remote add upstream https://codeberg.org/ziglang/zig.git
          git -C zig-source fetch --force --tags upstream

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git -C zig-source rev-parse HEAD)"
          short='${{ needs.sync.outputs.short_sha }}'
          subject="$(git -C zig-source log -1 --format=%s)"
          zig_version="$(bash automation/scripts/version-from-zig-source.sh zig-source)"

          index_json="$(curl -fsSL https://ziglang.org/download/index.json)"
          bootstrap_tarball="$(jq -r '.master.bootstrap.tarball' <<<"$index_json")"
          bootstrap_seed_version="$(jq -r '.master.version' <<<"$index_json")"
          bootstrap_seed_date="$(jq -r '.master.date' <<<"$index_json")"

          {
            echo "sha=$sha"
            echo "short_sha=$short"
            echo "subject=$subject"
            echo "zig_version=$zig_version"
            echo "release_tag=upstream-$short"
            echo "latest_release_tag=latest-master"
            echo "bootstrap_tarball=$bootstrap_tarball"
            echo "bootstrap_seed_version=$bootstrap_seed_version"
            echo "bootstrap_seed_date=$bootstrap_seed_date"
          } >> "$GITHUB_OUTPUT"

  build_linux:
    name: Build Linux Release Assets
    needs:
      - sync
      - metadata
    if: needs.sync.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.release_scope == 'all' || github.event.inputs.release_scope == 'linux')
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: automation

      - name: Checkout synced master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1
          path: zig-source

      - name: Verify synced master checkout
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git -C zig-source rev-parse HEAD)"
          expected='${{ needs.metadata.outputs.sha }}'

          if [[ "$sha" != "$expected" ]]; then
            echo "Expected upstream SHA $expected but checked out $sha" >&2
            exit 1
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config rsync xz-utils zip zlib1g-dev

      - name: Prepare bootstrap sources
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/bootstrap"
          curl -L --fail --output "$RUNNER_TEMP/bootstrap.tar.xz" '${{ needs.metadata.outputs.bootstrap_tarball }}'
          tar -xJf "$RUNNER_TEMP/bootstrap.tar.xz" -C "$RUNNER_TEMP/bootstrap" --strip-components=1

          rm -rf "$RUNNER_TEMP/bootstrap/zig"
          mkdir -p "$RUNNER_TEMP/bootstrap/zig"
          rsync -a --delete --exclude '.git' zig-source/ "$RUNNER_TEMP/bootstrap/zig/"

      - name: Build compiled Linux assets
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/dist"

          bash automation/scripts/build-zig-bootstrap-group.sh \
            "$RUNNER_TEMP/bootstrap" \
            '${{ needs.metadata.outputs.zig_version }}' \
            "$RUNNER_TEMP/dist" \
            x86_64-linux-musl \
            aarch64-linux-musl

      - name: Upload compiled Linux assets
        uses: actions/upload-artifact@v4
        with:
          name: compiled-assets-linux
          path: ${{ runner.temp }}/dist/*
          if-no-files-found: error
          retention-days: 7

  build_windows:
    name: Build Windows Release Assets
    needs:
      - sync
      - metadata
    if: needs.sync.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.release_scope == 'all' || github.event.inputs.release_scope == 'windows')
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: automation

      - name: Checkout synced master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1
          path: zig-source

      - name: Verify synced master checkout
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git -C zig-source rev-parse HEAD)"
          expected='${{ needs.metadata.outputs.sha }}'

          if [[ "$sha" != "$expected" ]]; then
            echo "Expected upstream SHA $expected but checked out $sha" >&2
            exit 1
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config rsync xz-utils zip zlib1g-dev

      - name: Prepare bootstrap sources
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/bootstrap"
          curl -L --fail --output "$RUNNER_TEMP/bootstrap.tar.xz" '${{ needs.metadata.outputs.bootstrap_tarball }}'
          tar -xJf "$RUNNER_TEMP/bootstrap.tar.xz" -C "$RUNNER_TEMP/bootstrap" --strip-components=1

          rm -rf "$RUNNER_TEMP/bootstrap/zig"
          mkdir -p "$RUNNER_TEMP/bootstrap/zig"
          rsync -a --delete --exclude '.git' zig-source/ "$RUNNER_TEMP/bootstrap/zig/"

      - name: Build compiled Windows assets
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/dist"

          bash automation/scripts/build-zig-bootstrap-group.sh \
            "$RUNNER_TEMP/bootstrap" \
            '${{ needs.metadata.outputs.zig_version }}' \
            "$RUNNER_TEMP/dist" \
            x86_64-windows-gnu \
            aarch64-windows-gnu

      - name: Upload compiled Windows assets
        uses: actions/upload-artifact@v4
        with:
          name: compiled-assets-windows
          path: ${{ runner.temp }}/dist/*
          if-no-files-found: error
          retention-days: 7

  build_macos:
    name: Build macOS Release Assets
    needs:
      - sync
      - metadata
    if: needs.sync.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.release_scope == 'all' || github.event.inputs.release_scope == 'macos')
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: automation

      - name: Checkout synced master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1
          path: zig-source

      - name: Verify synced master checkout
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git -C zig-source rev-parse HEAD)"
          expected='${{ needs.metadata.outputs.sha }}'

          if [[ "$sha" != "$expected" ]]; then
            echo "Expected upstream SHA $expected but checked out $sha" >&2
            exit 1
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config rsync xz-utils zip zlib1g-dev

      - name: Prepare bootstrap sources
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/bootstrap"
          curl -L --fail --output "$RUNNER_TEMP/bootstrap.tar.xz" '${{ needs.metadata.outputs.bootstrap_tarball }}'
          tar -xJf "$RUNNER_TEMP/bootstrap.tar.xz" -C "$RUNNER_TEMP/bootstrap" --strip-components=1

          rm -rf "$RUNNER_TEMP/bootstrap/zig"
          mkdir -p "$RUNNER_TEMP/bootstrap/zig"
          rsync -a --delete --exclude '.git' zig-source/ "$RUNNER_TEMP/bootstrap/zig/"

      - name: Build compiled macOS assets
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/dist"

          bash automation/scripts/build-zig-bootstrap-group.sh \
            "$RUNNER_TEMP/bootstrap" \
            '${{ needs.metadata.outputs.zig_version }}' \
            "$RUNNER_TEMP/dist" \
            x86_64-macos-none \
            aarch64-macos-none

      - name: Upload compiled macOS assets
        uses: actions/upload-artifact@v4
        with:
          name: compiled-assets-macos
          path: ${{ runner.temp }}/dist/*
          if-no-files-found: error
          retention-days: 7

  publish_release:
    name: Publish GitHub Releases
    needs:
      - sync
      - metadata
      - build_linux
      - build_windows
      - build_macos
    if: needs.sync.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.release_scope == 'all')
    runs-on: ubuntu-24.04
    steps:
      - name: Download compiled assets
        uses: actions/download-artifact@v4
        with:
          pattern: compiled-assets-*
          merge-multiple: true
          path: release-assets

      - name: Create rolling latest-master asset names
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p latest-assets

          for asset in release-assets/*; do
            file_name="$(basename "$asset")"
            latest_name="${file_name//${{ needs.metadata.outputs.zig_version }}/latest-master}"
            cp "$asset" "latest-assets/$latest_name"
          done

          find release-assets -maxdepth 1 -type f | sort > release-files.txt
          find latest-assets -maxdepth 1 -type f | sort > latest-files.txt

          {
            echo 'release_files<<EOF'
            cat release-files.txt
            echo EOF
            echo 'latest_files<<EOF'
            cat latest-files.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Publish immutable GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          target_commitish: ${{ needs.metadata.outputs.sha }}
          name: Zig upstream master ${{ needs.metadata.outputs.short_sha }}
          prerelease: true
          overwrite_files: true
          files: ${{ steps.assets.outputs.release_files }}
          body: |
            Automated sync from Codeberg `master`.

            Synced Codeberg commit: `${{ needs.metadata.outputs.sha }}`
            Commit subject: `${{ needs.metadata.outputs.subject }}`
            Compiled Zig version: `${{ needs.metadata.outputs.zig_version }}`

            These release assets are freshly compiled from the synced source tree in this workflow.
            They are not mirrored from `https://ziglang.org/download/`.

            Bootstrap seed source: `${{ needs.metadata.outputs.bootstrap_seed_version }}` published `${{ needs.metadata.outputs.bootstrap_seed_date }}`

            Included compiled binaries:
            - `zig-x86_64-linux`
            - `zig-aarch64-linux`
            - `zig-x86_64-windows`
            - `zig-aarch64-windows`
            - `zig-x86_64-macos`
            - `zig-aarch64-macos`

      - name: Publish rolling latest-master release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.latest_release_tag }}
          target_commitish: ${{ needs.metadata.outputs.sha }}
          name: Zig latest master
          prerelease: true
          overwrite_files: true
          files: ${{ steps.assets.outputs.latest_files }}
          body: |
            Rolling latest-master prerelease for the newest successful Codeberg `master` sync.

            Synced Codeberg commit: `${{ needs.metadata.outputs.sha }}`
            Commit subject: `${{ needs.metadata.outputs.subject }}`
            Compiled Zig version: `${{ needs.metadata.outputs.zig_version }}`

            These release assets are freshly compiled from the synced source tree in this workflow.
            They are not mirrored from `https://ziglang.org/download/`.

            Bootstrap seed source: `${{ needs.metadata.outputs.bootstrap_seed_version }}` published `${{ needs.metadata.outputs.bootstrap_seed_date }}`

            This tag is intentionally updated in place. Use the per-commit `upstream-<shortsha>` releases for immutable archives.
