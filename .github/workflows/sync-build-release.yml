          mkdir -p "$RUNNER_TEMP/dist"

          bash automation/scripts/build-zig-bootstrap-group.sh \
            "$RUNNER_TEMP/bootstrap" \
            '${{ needs.metadata.outputs.zig_version }}' \
            "$RUNNER_TEMP/dist" \
            x86_64-linux-musl

      - name: Upload compiled zig-x86_64-linux asset
        uses: actions/upload-artifact@v7
        with:
          name: compiled-assets-zig-x86_64-linux
          path: ${{ runner.temp }}/dist/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

