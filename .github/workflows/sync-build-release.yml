          mkdir -p "$RUNNER_TEMP/dist"

          bash automation/scripts/build-zig-bootstrap-group.sh \
            "$RUNNER_TEMP/bootstrap" \
            '${{ needs.metadata.outputs.zig_version }}' \
            "$RUNNER_TEMP/dist" \
            x86_64-macos-none

      - name: Upload compiled zig-x86_64-macos asset
        uses: actions/upload-artifact@v7
        with:
          name: compiled-assets-zig-x86_64-macos
          path: ${{ runner.temp }}/dist/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  build_aarch64_macos:
    name: Build zig-aarch64-macos Release Asset
    needs:
      - sync
      - metadata
      - build_host_toolchain
    if: needs.sync.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.release_scope == 'all' || github.event.inputs.release_scope == 'macos')
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v6
        with:
          ref: main
          path: automation

      - name: Checkout synced master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 1
          path: zig-source

      - name: Verify synced master checkout
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git -C zig-source rev-parse HEAD)"
          expected='${{ needs.metadata.outputs.sha }}'

          if [[ "$sha" != "$expected" ]]; then
            echo "Expected upstream SHA $expected but checked out $sha" >&2
            exit 1
          fi

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config rsync xz-utils zip zlib1g-dev zstd

      - name: Prepare bootstrap sources
        shell: bash
        run: |
          set -euo pipefail

          bash automation/scripts/prepare-bootstrap-sources.sh \
            "$RUNNER_TEMP/bootstrap" \
            '${{ needs.metadata.outputs.bootstrap_tarball }}' \
            '${{ needs.metadata.outputs.required_llvm_major }}'

          rm -rf "$RUNNER_TEMP/bootstrap/zig"
          mkdir -p "$RUNNER_TEMP/bootstrap/zig"
          rsync -a --delete --exclude '.git' zig-source/ "$RUNNER_TEMP/bootstrap/zig/"

      - name: Download bootstrap host toolchain
        uses: actions/download-artifact@v8
        with:
          name: bootstrap-host-toolchain
          path: ${{ runner.temp }}

      - name: Restore bootstrap host toolchain
        shell: bash
        run: |
          set -euo pipefail

          tar --use-compress-program 'zstd -d -T0' \
            -xf "$RUNNER_TEMP/host-bootstrap.tar.zst" \
            -C "$RUNNER_TEMP/bootstrap"

          test -x "$RUNNER_TEMP/bootstrap/out/host/bin/zig"
          test -x "$RUNNER_TEMP/bootstrap/out/host/bin/llvm-tblgen"
          test -x "$RUNNER_TEMP/bootstrap/out/build-llvm-host/bin/clang-tblgen"

      - name: Build compiled zig-aarch64-macos asset
        shell: bash
        env:
          CC: clang
          CXX: clang++
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/dist"

          bash automation/scripts/build-zig-bootstrap-group.sh \
            "$RUNNER_TEMP/bootstrap" \
            '${{ needs.metadata.outputs.zig_version }}' \
            "$RUNNER_TEMP/dist" \
            aarch64-macos-none

      - name: Upload compiled zig-aarch64-macos asset
        uses: actions/upload-artifact@v7
        with:
          name: compiled-assets-zig-aarch64-macos
          path: ${{ runner.temp }}/dist/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  publish_release:
    name: Publish GitHub Releases
    needs:
      - sync
      - metadata
      - build_x86_64_linux
      - build_aarch64_linux
      - build_x86_64_windows
      - build_aarch64_windows
      - build_x86_64_macos
      - build_aarch64_macos
    if: needs.sync.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.release_scope == 'all')
    runs-on: ubuntu-24.04
    steps:
      - name: Download compiled assets
        uses: actions/download-artifact@v8
        with:
          pattern: compiled-assets-*
          merge-multiple: true
          path: release-assets

      - name: Create rolling latest-master asset names
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p latest-assets

          for asset in release-assets/*; do
            file_name="$(basename "$asset")"
            latest_name="${file_name//${{ needs.metadata.outputs.zig_version }}/latest-master}"
            cp "$asset" "latest-assets/$latest_name"
          done

          find release-assets -maxdepth 1 -type f | sort > release-files.txt
          find latest-assets -maxdepth 1 -type f | sort > latest-files.txt

          {
            echo 'release_files<<EOF'
            cat release-files.txt
            echo EOF
            echo 'latest_files<<EOF'
            cat latest-files.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          delete_assets_for_tag() {
            local tag="$1"
            local release_id

            if ! release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/$tag" --jq .id 2>/dev/null)"; then
              return 0
            fi

            mapfile -t asset_ids < <(
              gh api --paginate "repos/${GITHUB_REPOSITORY}/releases/$release_id/assets" --jq '.[].id'
            )

            for asset_id in "${asset_ids[@]}"; do
              [[ -n "$asset_id" ]] || continue
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/$asset_id" --silent
            done
          }

          delete_assets_for_tag '${{ needs.metadata.outputs.release_tag }}'
          delete_assets_for_tag '${{ needs.metadata.outputs.latest_release_tag }}'

      - name: Publish immutable GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          target_commitish: ${{ needs.metadata.outputs.sha }}
          name: Zig upstream master ${{ needs.metadata.outputs.short_sha }}
          prerelease: true
          overwrite_files: true
          files: ${{ steps.assets.outputs.release_files }}
          body: |
            Automated sync from Codeberg `master`.

            Synced Codeberg commit: `${{ needs.metadata.outputs.sha }}`
            Commit subject: `${{ needs.metadata.outputs.subject }}`
            Compiled Zig version: `${{ needs.metadata.outputs.zig_version }}`

            These release assets are freshly compiled from the synced source tree in this workflow.
            They are not mirrored from `https://ziglang.org/download/`.

            Bootstrap seed source: `${{ needs.metadata.outputs.bootstrap_seed_version }}` published `${{ needs.metadata.outputs.bootstrap_seed_date }}`

            Included compiled binaries:
            - `zig-x86_64-linux`
            - `zig-aarch64-linux`
            - `zig-x86_64-windows`
            - `zig-aarch64-windows`
            - `zig-x86_64-macos`
            - `zig-aarch64-macos`

      - name: Publish rolling latest-master release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.metadata.outputs.latest_release_tag }}
          target_commitish: ${{ needs.metadata.outputs.sha }}
          name: Zig latest master
          prerelease: true
          overwrite_files: true
          files: ${{ steps.assets.outputs.latest_files }}
          body: |
            Rolling latest-master prerelease for the newest successful Codeberg `master` sync.

            Synced Codeberg commit: `${{ needs.metadata.outputs.sha }}`
            Commit subject: `${{ needs.metadata.outputs.subject }}`
            Compiled Zig version: `${{ needs.metadata.outputs.zig_version }}`

            These release assets are freshly compiled from the synced source tree in this workflow.
            They are not mirrored from `https://ziglang.org/download/`.

            Bootstrap seed source: `${{ needs.metadata.outputs.bootstrap_seed_version }}` published `${{ needs.metadata.outputs.bootstrap_seed_date }}`

            This tag is intentionally updated in place. Use the per-commit `upstream-<shortsha>` releases for immutable archives.
